<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ruta Salvaje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="styles/tailwind-config.js"></script>
</head>
<body class="bg-crema text-gray-800">
    <nav class="sticky top-0 z-50 flex justify-between items-center py-6 px-10 bg-white shadow-md">
        <a href="index.html" class="text-3xl font-bold text-bosque font-serif hover:text-naranja transition">Ruta <i class="bi bi-fire"></i> Salvaje</a>
        <div class="hidden md:flex space-x-8 font-semibold">
            <a href="index.html" class="text-bosque hover:text-naranja transition"><i class="bi bi-house-door-fill"></i> Inicio</a>
            <a href="index.html#guias" class="text-bosque hover:text-naranja transition"><i class="bi bi-map-fill"></i> Guías de Aventura</a>
            <a href="equipo.html" class="text-bosque hover:text-naranja transition"><i class="bi bi-handbag-fill"></i> Equipo</a>
            <a href="nosotros.html" class="text-bosque hover:text-naranja transition"><i class="bi bi-person-arms-up"></i> Nosotros</a>
            <a href="contacto.html" class="text-bosque hover:text-naranja transition"><i class="bi bi-envelope-fill"></i> Contacto</a>
        </div>
        <div id="nav-auth-buttons" class="flex items-center gap-4">
            <a href="login.html" class="btn btn-welcome px-4 py-2 rounded-full font-bold transition shadow-lg flex items-center gap-2">
                <i class="bi bi-box-arrow-in-right"></i>
                Iniciar sesión
            </a>
            <button
                class="btn btn-welcome px-5 py-2.5 rounded-full font-bold transition shadow-lg text-sm whitespace-nowrap">
                Planifica tu viaje  <i class="bi bi-calendar-event-fill"></i>
            </button>
            <button id="openCartButton" class="bg-bosque hover:bg-slate-800 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg text-sm whitespace-nowrap flex items-center gap-2" type="button" onclick="window.location.href='equipo.html?openCart=1'">
                <i class="bi bi-cart3"></i>
                <span id="cartCount">0</span>
            </button>

        </div>
    </nav>

    <main class="py-20 px-6 lg:px-10">
        <div class="auth-panel">
            <div class="auth-header text-center">
                <p class="text-sm uppercase tracking-[0.3em] text-naranja font-bold">Cuenta</p>
                <h1 class="text-4xl font-bold text-bosque mt-4">Bienvenido de nuevo</h1>
                <p class="text-gray-600 mt-3">Accede a tu perfil o regístrate para comenzar tu próxima aventura.</p>
            </div>

            <div id="messageBox"></div>

            <div id="loginView">
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="loginEmail" class="block text-sm font-semibold text-gray-700 mb-2">Correo</label>
                        <input id="loginEmail" type="email" class="form-input" placeholder="tucorreo@ejemplo.com" required>
                    </div>
                    <div>
                        <label for="loginPassword" class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                        <input id="loginPassword" type="password" class="form-input" placeholder="********" required>
                    </div>
                    <div class="flex items-center gap-2">
                        <input id="rememberCheck" type="checkbox" class="h-4 w-4" />
                        <label for="rememberCheck" class="text-sm text-gray-700">Recuérdame</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Entrar</button>
                </form>

                <div class="auth-actions mt-6">
                    <button id="showRegisterBtn" class="btn btn-secondary w-full">Registrarme</button>
                    <button id="forgotPasswordBtn" class="btn btn-secondary w-full">Recordar contraseña</button>
                </div>
            </div>

            <div id="registerView" class="hidden">
                <form id="registerForm" class="space-y-6">
                    <div>
                        <label for="registerName" class="block text-sm font-semibold text-gray-700 mb-2">Nombre</label>
                        <input id="registerName" type="text" class="form-input" placeholder="Tu nombre completo" required>
                    </div>
                    <div>
                        <label for="registerEmail" class="block text-sm font-semibold text-gray-700 mb-2">Correo</label>
                        <input id="registerEmail" type="email" class="form-input" placeholder="tucorreo@ejemplo.com" required>
                    </div>
                    <div>
                        <label for="registerPassword" class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                        <input id="registerPassword" type="password" class="form-input" placeholder="Crea una contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Registrarme</button>
                </form>

                <div class="auth-switch mt-6">
                    <button id="backToLoginBtn" class="text-sm text-bosque hover:text-naranja font-semibold">Volver al login</button>
                </div>
            </div>

            <div id="recoverPasswordView" class="hidden">
                <form id="recoverPasswordForm" class="space-y-6">
                    <div>
                        <label for="recoverEmail" class="block text-sm font-semibold text-gray-700 mb-2">Correo</label>
                        <input id="recoverEmail" type="email" class="form-input" placeholder="tucorreo@ejemplo.com" required>
                    </div>
                    <div>
                        <label for="recoveryCode" class="block text-sm font-semibold text-gray-700 mb-2">Código de verificación</label>
                        <input id="recoveryCode" type="text" class="form-input" placeholder="Ingresa el código enviado" required>
                    </div>
                    <div>
                        <label for="newPassword" class="block text-sm font-semibold text-gray-700 mb-2">Nueva contraseña</label>
                        <input id="newPassword" type="password" class="form-input" placeholder="Nueva contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Recuperar contraseña</button>
                </form>

                <div class="auth-switch mt-6">
                    <button id="backToLoginFromRecoveryBtn" class="text-sm text-bosque hover:text-naranja font-semibold">Volver al login</button>
                </div>
            </div>
        </div>
    </main>

    <div class="redes-flotantes">
        <a href="https://facebook.com" target="_blank" title="Facebook"><i class="bi bi-facebook"></i></a>
        <a href="https://instagram.com" target="_blank" title="Instagram"><i class="bi bi-instagram"></i></a>
        <a href="https://twitter.com" target="_blank" title="Twitter"><i class="bi bi-twitter"></i></a>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
