<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ruta Salvaje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="styles/tailwind-config.js"></script>
</head>
<body class="bg-crema text-gray-800">
    <nav class="sticky top-0 z-50 flex justify-between items-center py-6 px-10 bg-white shadow-md">
        <a href="index.html" class="text-3xl font-bold text-bosque font-serif hover:text-naranja transition">Ruta Salvaje</a>
        <div class="hidden md:flex space-x-8 font-semibold">
            <a href="index.html" class="text-bosque hover:text-naranja transition">Inicio</a>
            <a href="index.html#guias" class="text-bosque hover:text-naranja transition">Guías de Aventura</a>
            <a href="equipo.html" class="text-bosque hover:text-naranja transition">Equipo</a>
            <a href="nosotros.html" class="text-bosque hover:text-naranja transition">Nosotros</a>
            <a href="contacto.html" class="text-bosque hover:text-naranja transition">Contacto</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="login.html" class="bg-naranja hover:bg-orange-600 text-white px-4 py-2 rounded-full font-bold transition shadow-lg flex items-center gap-2">
                <i class="bi bi-box-arrow-in-right"></i>
                Iniciar sesión
            </a>
            <a href="index.html" class="bg-naranja hover:bg-orange-600 text-white px-6 py-3 rounded-full font-bold transition shadow-lg">Planifica tu viaje</a>
        </div>
    </nav>

    <main class="py-20 px-6 lg:px-10">
        <div class="auth-panel">
            <div class="auth-header text-center">
                <p class="text-sm uppercase tracking-[0.3em] text-naranja font-bold">Cuenta</p>
                <h1 class="text-4xl font-bold text-bosque mt-4">Bienvenido de nuevo</h1>
                <p class="text-gray-600 mt-3">Accede a tu perfil o regístrate para comenzar tu próxima aventura.</p>
            </div>

            <div id="messageBox"></div>

            <div id="loginView">
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="loginEmail" class="block text-sm font-semibold text-gray-700 mb-2">Correo</label>
                        <input id="loginEmail" type="email" class="form-input" placeholder="tucorreo@ejemplo.com" required>
                    </div>
                    <div>
                        <label for="loginPassword" class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                        <input id="loginPassword" type="password" class="form-input" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Entrar</button>
                </form>

                <div class="auth-actions mt-6">
                    <button id="showRegisterBtn" class="btn btn-secondary w-full">Registrarme</button>
                    <button id="forgotPasswordBtn" class="btn btn-secondary w-full">Recordar contraseña</button>
                </div>
            </div>

            <div id="registerView" class="hidden">
                <form id="registerForm" class="space-y-6">
                    <div>
                        <label for="registerName" class="block text-sm font-semibold text-gray-700 mb-2">Nombre</label>
                        <input id="registerName" type="text" class="form-input" placeholder="Tu nombre completo" required>
                    </div>
                    <div>
                        <label for="registerEmail" class="block text-sm font-semibold text-gray-700 mb-2">Correo</label>
                        <input id="registerEmail" type="email" class="form-input" placeholder="tucorreo@ejemplo.com" required>
                    </div>
                    <div>
                        <label for="registerPassword" class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                        <input id="registerPassword" type="password" class="form-input" placeholder="Crea una contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Registrarme</button>
                </form>

                <div class="auth-switch mt-6">
                    <button id="backToLoginBtn" class="text-sm text-bosque hover:text-naranja font-semibold">Volver al login</button>
                </div>
            </div>
        </div>
    </main>

    <div class="redes-flotantes">
        <a href="https://facebook.com" target="_blank" title="Facebook"><i class="bi bi-facebook"></i></a>
        <a href="https://instagram.com" target="_blank" title="Instagram"><i class="bi bi-instagram"></i></a>
        <a href="https://twitter.com" target="_blank" title="Twitter"><i class="bi bi-twitter"></i></a>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginView = document.getElementById('loginView');
        const registerView = document.getElementById('registerView');
        const messageBox = document.getElementById('messageBox');
        const showRegisterBtn = document.getElementById('showRegisterBtn');
        const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
        const backToLoginBtn = document.getElementById('backToLoginBtn');

        function clearMessageBox() {
            messageBox.innerHTML = '';
        }

        function showMessage(text, type = 'success', showClose = false) {
            const className = type === 'error' ? 'message-error' : 'message-success';
            const closeButton = showClose ? ` <button type="button" id="messageCloseBtn" class="rounded-full bg-white/10 px-3 py-1 text-sm text-white hover:bg-white/20">Cerrar</button>` : '';
            messageBox.innerHTML = `<div class="${className} flex items-center justify-between gap-4">${text}${closeButton}</div>`;

            if (!showClose) {
                setTimeout(() => {
                    clearMessageBox();
                }, 5000);
            } else {
                const messageCloseBtn = document.getElementById('messageCloseBtn');
                if (messageCloseBtn) {
                    messageCloseBtn.addEventListener('click', function () {
                        clearMessageBox();
                        showLoginForm();
                    });
                }
            }
        }

        function showRegisterForm() {
            loginView.classList.add('hidden');
            registerView.classList.remove('hidden');
            clearMessageBox();
        }

        function showLoginForm() {
            registerView.classList.add('hidden');
            loginView.classList.remove('hidden');
        }

        if (loginForm) {
            loginForm.addEventListener('submit', function (event) {
                event.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();

                localStorage.setItem('userEmail', email);

                showMessage('Redirigiendo a tu perfil...');
                setTimeout(() => {
                    window.location.href = `profile.html`;
                }, 800);
            });
        }


        if (registerForm) {
            registerForm.addEventListener('submit', function (event) {
                event.preventDefault();
                showLoginForm();
                showMessage('Registrado correctamente.', 'success', true);
                registerForm.reset();
            });
        }

        showRegisterBtn.addEventListener('click', showRegisterForm);
        backToLoginBtn.addEventListener('click', showLoginForm);
        forgotPasswordBtn.addEventListener('click', function () {
            showMessage('Recuperación de contraseña simulada. Revisa tu correo o contacta soporte.', 'error');
        });
    </script>
</body>
</html>
