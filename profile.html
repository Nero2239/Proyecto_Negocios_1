<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Ruta Salvaje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="styles/tailwind-config.js"></script>
</head>
<body class="bg-crema text-gray-800">
    <nav class="sticky top-0 z-50 flex justify-between items-center py-6 px-10 bg-white shadow-md">
        <a href="index.html" class="text-3xl font-bold text-bosque font-serif hover:text-naranja transition">Ruta Salvaje</a>
        <div class="hidden md:flex space-x-8 font-semibold">
            <a href="index.html" class="text-bosque hover:text-naranja transition">Inicio</a>
            <a href="index.html#guias" class="text-bosque hover:text-naranja transition">Guías de Aventura</a>
            <a href="equipo.html" class="text-bosque hover:text-naranja transition">Equipo</a>
            <a href="nosotros.html" class="text-bosque hover:text-naranja transition">Nosotros</a>
            <a href="contacto.html" class="text-bosque hover:text-naranja transition">Contacto</a>
        </div>
        <div id="nav-auth-buttons" class="flex items-center gap-4">
            <a href="login.html" class="bg-naranja hover:bg-orange-600 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg flex items-center gap-2 text-sm whitespace-nowrap">
                <i class="bi bi-box-arrow-in-right"></i>
                <span>Iniciar sesión</span>
            </a>
            <button class="bg-naranja hover:bg-orange-600 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg text-sm whitespace-nowrap">Planifica tu viaje</button>
        </div>
    </nav>

    <main class="py-20 px-6 lg:px-10">
        <div class="auth-panel text-center">
            <div class="auth-header">
                <p class="text-sm uppercase tracking-[0.3em] text-naranja font-bold">Perfil</p>
                <h1 class="text-4xl font-bold text-bosque mt-4">Tu espacio en Ruta Salvaje</h1>
                <p class="text-gray-600 mt-3">Bienvenido 🦝</p>
            </div>

            <div class="bg-gray-50 rounded-[1.75rem] p-8 shadow-sm text-left">
                <p class="text-lg font-semibold text-bosque">Correo registrado</p>
                <p id="profileEmail" class="text-gray-700 mt-2 text-lg">usuario@ruta.com</p>
                <div class="mt-8 grid gap-4 md:grid-cols-2">
                    <div class="p-6 bg-white rounded-3xl shadow-sm">
                        <p class="text-sm text-gray-500">Rol</p>
                        <p class="text-lg font-semibold mt-2">Campista explorador</p>
                    </div>
                    <div class="p-6 bg-white rounded-3xl shadow-sm">
                        <p class="text-sm text-gray-500">Último acceso</p>
                        <p class="text-lg font-semibold mt-2">Hoy</p>
                    </div>
                </div>
            </div>

            <div class="auth-actions mt-10 justify-center">
                <a href="login.html" class="btn btn-secondary">Cerrar sesión</a>
                <a href="index.html" class="btn btn-primary">Ir al inicio</a>
            </div>
        </div>
    </main>

    <div class="redes-flotantes">
        <a href="https://facebook.com" target="_blank" title="Facebook"><i class="bi bi-facebook"></i></a>
        <a href="https://instagram.com" target="_blank" title="Instagram"><i class="bi bi-instagram"></i></a>
        <a href="https://twitter.com" target="_blank" title="Twitter"><i class="bi bi-twitter"></i></a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userEmail = localStorage.getItem('userEmail');
            const navAuthContainer = document.getElementById('nav-auth-buttons');

            if (userEmail && navAuthContainer) {
                navAuthContainer.innerHTML = `
                    <div class="flex items-center gap-4">
                        <a href="profile.html" class="font-semibold text-bosque hover:text-naranja transition hidden sm:block" title="${userEmail}">
                            ${userEmail}
                        </a>
                        <button id="navLogoutBtn" title="Cerrar sesión" class="text-bosque hover:text-naranja transition text-xl">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </div>
                    <button class="bg-naranja hover:bg-orange-600 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg text-sm whitespace-nowrap">Planifica tu viaje</button>
                `;

                document.getElementById('navLogoutBtn').addEventListener('click', function() {
                    localStorage.removeItem('userEmail');
                    window.location.href = 'index.html';
                });
            }

            document.getElementById('profileEmail').textContent = userEmail || 'usuario@ruta.com';

            const mainLogoutButton = document.querySelector('a[href="login.html"].btn-secondary');
            mainLogoutButton.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('userEmail');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
