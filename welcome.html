<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenid@ · Ruta Salvaje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F6F0;
            color: #2C302E;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .welcome-card.exiting {
            animation: fadeOutDown 0.5s ease-in forwards;
        }
        @keyframes fadeOutDown {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(20px);
            }
        }
    </style>
</head>
<body class="antialiased selection:bg-[#606C5A] selection:text-white">

    <div class="relative min-h-screen w-full flex items-center justify-center overflow-hidden p-4">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1510312305653-8ed496efae75?q=80&w=1920&auto=format&fit=crop" 
                 alt="Camping en bosque nórdico" 
                 class="w-full h-full object-cover brightness-[0.85] contrast-[0.95]">
        </div>
        <div class="absolute inset-0 bg-black/20 z-0"></div>

        <!-- Welcome Card -->
        <div class="welcome-card relative z-10 max-w-lg w-full bg-white/80 backdrop-blur-lg border border-white/30 p-8 md:p-12 rounded-2xl text-center shadow-2xl fade-in-up">
            <h1 class="font-serif text-4xl md:text-5xl font-light text-[#2C302E] leading-tight">
                Desconecta para <span class="italic">conectar</span>.
            </h1>
            <p class="mt-4 text-lg text-[#2C302E]/80 tracking-wide">
                Bienvenido a Ruta Salvaje. Tu refugio y la atmósfera que estabas buscando.
            </p>
            <div class="mt-8">
                <button id="enterBtn" class="bg-[#606C5A] text-[#F9F6F0] px-8 py-3 rounded-md tracking-wider text-sm uppercase hover:bg-[#4d5748] transition-colors inline-block shadow-md">
                    Explorar Aventura
                </button>
            </div>
        </div>

    </div>

    <script>
        document.getElementById('enterBtn').addEventListener('click', function(){
            const card = document.querySelector('.welcome-card');
            card.classList.add('exiting');
            setTimeout(()=>{
                if (window.opener && !window.opener.closed) {
                    try { window.opener.focus(); } catch(e) {}
                    window.close();
                    return;
                }
                window.location.href = 'index.html';
            }, 420);
        });
    </script>
</body>
</html>
